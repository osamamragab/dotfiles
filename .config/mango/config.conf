# More option see https://github.com/DreamMaoMao/mango/wiki/

# Window effect
blur=0
blur_layer=0
blur_optimized=1
blur_params_num_passes=2
blur_params_radius=5
blur_params_noise=0.02
blur_params_brightness=0.9
blur_params_contrast=0.9
blur_params_saturation=1.2

shadows=0
layer_shadows=0
shadow_only_floating=1
shadows_size=10
shadows_blur=15
shadows_position_x=0
shadows_position_y=0
shadowscolor=0x000000ff

border_radius=0
no_radius_when_single=0
focused_opacity=1.0
unfocused_opacity=1.0

# Animation Configuration(support type:zoom,slide)
# tag_animation_direction: 1-horizontal,0-vertical
animations=1
layer_animations=0
animation_type_open=slide
animation_type_close=slide
animation_fade_in=1
animation_fade_out=1
tag_animation_direction=1
zoom_initial_ratio=0.4
zoom_end_ratio=0.8
fadein_begin_opacity=0.5
fadeout_begin_opacity=0.8
animation_duration_tag=350
animation_duration_move=350
animation_duration_open=200
animation_duration_close=200
animation_duration_focus=0
animation_curve_open=0.46,1.0,0.29,1
animation_curve_move=0.46,1.0,0.29,1
animation_curve_tag=0.46,1.0,0.29,1
animation_curve_close=0.08,0.92,0,1
animation_curve_focus=0.46,1.0,0.29,1
animation_curve_opafadeout=0.5,0.5,0.5,0.5
animation_curve_opafadein=0.46,1.0,0.29,1

# Scroller Layout Setting
scroller_structs=20
scroller_default_proportion=0.8
scroller_focus_center=0
scroller_prefer_center=0
edge_scroller_pointer_focus=1
scroller_default_proportion_single=1.0
scroller_proportion_preset=0.5,0.8,1.0

# Master-Stack Layout Setting
new_is_master=1
default_mfact=0.55
default_nmaster=1
smartgaps=1

# Dwindle Layout Setting
dwindle_smart_split=0
dwindle_drop_simple_split=1
dwindle_manual_split=0
dwindle_hsplit=1
dwindle_vsplit=1
dwindle_preserve_split=0

# Overview Setting
hotarea_size=10
enable_hotarea=0
ov_tab_mode=0
overviewgappi=5
overviewgappo=30

# Misc
no_border_when_single=0
axis_bind_apply_timeout=100
focus_on_activate=0
idleinhibit_ignore_visible=0
sloppyfocus=0
warpcursor=1
cursor_hide_timeout=5
cursor_hide_on_keypress=1
focus_cross_monitor=0
focus_cross_tag=0
enable_floating_snap=0
snap_distance=30
cursor_size=24
drag_tile_to_tile=1
drag_tile_small=1
scratchpad_cross_monitor=1
single_scratchpad=1
xwayland_persistence=1
allow_shortcuts_inhibit=1

# keyboard
repeat_rate=50
repeat_delay=200
numlockon=0
xkb_rules_layout=us,ara
xkb_rules_options=grp:alt_space_toggle,grp_led:caps

# Trackpad
# need relogin to make it apply
disable_trackpad=0
tap_to_click=1
tap_and_drag=1
drag_lock=1
trackpad_natural_scrolling=0
disable_while_typing=1
left_handed=0
middle_button_emulation=0
swipe_min_threshold=1

# mouse
# need relogin to make it apply
mouse_natural_scrolling=0

# Appearance
gappih=5
gappiv=5
gappoh=0
gappov=0
scratchpad_width_ratio=0.6
scratchpad_height_ratio=0.7
borderpx=2
cursor_size=24
cursor_theme=Adwaita
rootcolor=0x2e3440ff
bordercolor=0x4c566aff
dropcolor=0x4c566a55
splitcolor=0xb74e58ff
focuscolor=0x5e81acff
maximizescreencolor=0x97b67cff
urgentcolor=0xb74e58ff
scratchpadcolor=0x5e81acff
globalcolor=0x80b3b2ff
overlaycolor=0x14a57cff

# layout support:
# tile,scroller,grid,deck,monocle,center_tile,vertical_tile,vertical_scroller
tagrule=id:1,layout_name:tile
tagrule=id:2,layout_name:tile
tagrule=id:3,layout_name:tile
tagrule=id:4,layout_name:tile
tagrule=id:5,layout_name:tile
tagrule=id:6,layout_name:tile
tagrule=id:7,layout_name:tile
tagrule=id:8,layout_name:tile
tagrule=id:9,layout_name:tile

bind=SUPER+SHIFT,R,reload_config
bind=SUPER+SHIFT,C,killclient

# switch window focus
bind=SUPER,J,focusstack,next
bind=SUPER,K,focusstack,previous
bind=SUPER,Up,focusdir,up
bind=SUPER,Down,focusdir,down
bind=SUPER,Left,focusdir,left
bind=SUPER,Right,focusdir,right
bind=SUPER,Tab,view,-1
bind=SUPER,Space,zoom

# swap window
bind=SUPER+SHIFT,K,exchange_client,up
bind=SUPER+SHIFT,J,exchange_client,down
bind=SUPER+SHIFT,H,exchange_client,left
bind=SUPER+SHIFT,L,exchange_client,right

# switch window status
bind=SUPER,S,toggleglobal,
bind=SUPER+SHIFT,Tab,toggleoverview,
bind=SUPER+SHIFT,Space,togglefloating,
bind=SUPER,F,togglefullscreen,
bind=SUPER+ALT,F,togglefakefullscreen,
bind=SUPER+SHIFT,F,togglemaximizescreen,
bind=SUPER+CTRL,F,toggleoverlay,
bind=SUPER+CTRL,P,minimized,
bind=SUPER+ALT,P,restore_minimized
bind=SUPER+SHIFT,P,toggle_scratchpad
bind=SUPER,P,toggle_named_scratchpad,terminal-scratchpad,none,terminal -a terminal-scratchpad -w 840x560

windowrule=isterm:1,appid:foot
windowrule=isterm:1,appid:footclient
windowrule=isterm:1,isnamedscratchpad:1,width:840,height:560,appid:terminal-scratchpad
windowrule=isterm:1,isfloating:1,width:840,height:560,appid:terminal-floating

# scroller layout
bind=SUPER+SHIFT,S,set_proportion,1.0
bind=SUPER+ALT,S,switch_proportion_preset,
bind=SUPER+CTRL+ALT,H,scroller_stack,left
bind=SUPER+CTRL+ALT,L,scroller_stack,right
bind=SUPER+CTRL+ALT,K,scroller_stack,up
bind=SUPER+CTRL+ALT,J,scroller_stack,down

#dwindle layout(manual split mode)
bind=SUPER+SHIFT,D,dwindle_toggle_split_direction

# switch layout
bind=SUPER,T,switch_layout
bind=SUPER+SHIFT,T,setlayout,tile

# tag switch
bind=SUPER+SHIFT,Left,viewtoleft,0
bind=SUPER+CTRL+SHIFT,Left,viewtoleft_have_client,0
bind=SUPER+SHIFT,Right,viewtoright,0
bind=SUPER+CTRL+SHIFT,Right,viewtoright_have_client,0
bind=SUPER+ALT,Left,tagtoleft,0
bind=SUPER+ALT,Right,tagtoright,0

bind=SUPER,1,view,1,0
bind=SUPER,2,view,2,0
bind=SUPER,3,view,3,0
bind=SUPER,4,view,4,0
bind=SUPER,5,view,5,0
bind=SUPER,6,view,6,0
bind=SUPER,7,view,7,0
bind=SUPER,8,view,8,0
bind=SUPER,9,view,9,0

# tag: move client to the tag and focus it
# tagsilent: move client to the tag and not focus it
bind=SUPER+SHIFT,1,tag,1,0
bind=SUPER+SHIFT,2,tag,2,0
bind=SUPER+SHIFT,3,tag,3,0
bind=SUPER+SHIFT,4,tag,4,0
bind=SUPER+SHIFT,5,tag,5,0
bind=SUPER+SHIFT,6,tag,6,0
bind=SUPER+SHIFT,7,tag,7,0
bind=SUPER+SHIFT,8,tag,8,0
bind=SUPER+SHIFT,9,tag,9,0

# monitor switch
bind=SUPER,Comma,focusmon,left
bind=SUPER,Period,focusmon,right
bind=SUPER+SHIFT,Comma,tagmon,left
bind=SUPER+SHIFT,Period,tagmon,right

# movewin
bind=SUPER+CTRL+SHIFT,Up,movewin,+0,-50
bind=SUPER+CTRL+SHIFT,Down,movewin,+0,+50
bind=SUPER+CTRL+SHIFT,Left,movewin,-50,+0
bind=SUPER+CTRL+SHIFT,Right,movewin,+50,+0

# resizewin
bind=SUPER+CTRL,K,resizewin,+0,-50
bind=SUPER+CTRL,J,resizewin,+0,+50
bind=SUPER,H,resizewin,-50,+0
bind=SUPER,L,resizewin,+50,+0

# Mouse Button Bindings
# btn_left and btn_right can't bind NONE mod key
mousebind=SUPER,btn_left,moveresize,curmove
mousebind=SUPER,btn_middle,togglemaximizescreen,0
mousebind=SUPER,btn_right,moveresize,curresize

# Axis Bindings
axisbind=SUPER,Up,viewtoleft_have_client
axisbind=SUPER,Down,viewtoright_have_client

# layer rule
layerrule=animation_type_open:slide,layer_name:launcher
layerrule=animation_type_close:slide,layer_name:launcher

bind=SUPER,Return,spawn,terminal
bind=NONE,Menu,spawn,menu-handler
bind=SUPER,M,spawn,menu-handler
bind=SUPER,R,spawn,menu-handler apps
bind=SUPER,Q,spawn,menu-handler system-actions
bind=NONE,Print,spawn,menu-handler screenshot
bind=ALT,Print,spawn,menu-handler screen-recording
bind=CTRL+ALT,Print,spawn,menu-handler screen-recording stop
bind=SUPER,I,spawn,menu-handler input-handler
bind=SUPER,O,spawn,menu-handler clipboard-history
bind=SUPER+SHIFT,O,spawn,menu-handler recent-files
bind=SUPER,Backslash,spawn,menu-handler notifications clear
bind=SUPER+SHIFT,Backslash,spawn,menu-handler notifications dnd
bind=NONE,XF86PowerOff,spawn,menu-handler system-actions
bind=NONE,XF86Display,spawn,menu-handler display-profiles
bindl=NONE,XF86Eject,spawn,eject -T
bindl=NONE,XF86AudioRaiseVolume,spawn,audioctl 5%+
bindl=NONE,XF86AudioLowerVolume,spawn,audioctl 5%-
bindl=NONE,XF86AudioMute,spawn,audioctl toggle
bindl=NONE,XF86AudioMicMute,spawn,audioctl mic toggle
bindl=SUPER,Equal,spawn,audioctl 5%+
bindl=SUPER,Minus,spawn,audioctl 5%-
bindl=SUPER,Backspace,spawn,audioctl toggle
bindl=SUPER+CTRL,Backspace,spawn,audioctl mic toggle
bindl=NONE,XF86AudioNext,spawn,playerctl next
bindl=NONE,XF86AudioPrev,spawn,playerctl previous
bindl=NONE,XF86AudioPlay,spawn,playerctl play-pause
bindl=NONE,XF86AudioMedia,spawn,playerctl play-pause
bindl=SUPER+SHIFT,Equal,spawn,playerctl next
bindl=SUPER+SHIFT,Minus,spawn,playerctl previous
bindl=SUPER+SHIFT,Backspace,spawn,playerctl play-pause
bindl=NONE,XF86MonBrightnessUp,spawn,screenlightctl 10%+
bindl=NONE,XF86MonBrightnessDown,spawn,screenlightctl 10%-

env=SDL_VIDEODRIVER,wayland
env=CLUTTER_BACKEND,wayland
env=QT_QPA_PLATFORM,wayland;xcb
env=ELM_DISPLAY,wl
env=MOZ_ENABLE_WAYLAND,1
env=NO_AT_BRIDGE,1
env=_JAVA_AWT_WM_NONREPARENTING,1
env=AWT_TOOLKIT,MToolkit wmname LG3D

exec-once=$XDG_CONFIG_HOME/shell/autorun
